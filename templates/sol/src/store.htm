<!DOCTYPE html>
<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
	<meta charset="UTF-8">
	<title>store</title>
	<script>
		var LOCAL_STORAGE_PREFIX="iframe_";function getCookie(e){var o=document.cookie.match(new RegExp("(?:^|; )"+e.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g,"\\$1")+"=([^;]*)"));return o?decodeURIComponent(o[1]):localStorage.getItem(LOCAL_STORAGE_PREFIX+e)}function setCookie(e,o){var a=e+"="+o+";path=/;expires=Fri, 31 Dec 9999 23:59:59 GMT";localStorage.setItem(LOCAL_STORAGE_PREFIX+e,o),document.cookie=a}function receiveMessage(e){var o=null;try{o=JSON.parse(e.data)}catch(e){}if(o)switch(o.action){case"set_cookie":setCookie(o.name,o.value);break;case"get_cookie":var a=getCookie(o.name);e.source.postMessage(JSON.stringify({action:"get_cookie",value:a,data:o}),e.origin);break;case"set_cookies":for(var t=0;t<o.cookies.length;t++){var i=o.cookies[t];setCookie(i.name,i.value)}break;case"get_cookies":var s=[];for(t=0;t<o.cookies.length;t++)try{var c=o.cookies[t];s.push({name:c,value:getCookie(c)})}catch(e){}e.source.postMessage(JSON.stringify({action:"get_cookies",value:s,data:o}),e.origin)}}window.addEventListener("message",receiveMessage,!1),window.top.postMessage("ready","*");
	</script>
</head>
